name: Daily scan (cloud)

# Runs the mechanical daily pipeline in the cloud so it fires 365 nights
# regardless of whether the laptop is on. 18:35 IST = 13:05 UTC, Mon-Fri
# (NSE trading days). Also runnable on demand via the "Run workflow" button.
on:
  schedule:
    - cron: "5 13 * * 1-5"
  workflow_dispatch: {}

# allow the job to commit the forward record back to the repo
permissions:
  contents: write

# daily and weekly must never run at the same time (they share the cache and
# both push) — one at a time, queued
concurrency:
  group: golden-stock-pipeline
  cancel-in-progress: false

defaults:
  run:
    working-directory: multibagger_screener/multibagger_screener

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # secrets surfaced as plain env so `if:` can test them (secrets can't be
      # read directly in step conditions). Empty string when the secret is unset.
      # NOTE: ANTHROPIC_API_KEY deliberately NOT surfaced (2026-07-20, user
      # decision) — the cloud runs ZERO AI. Nightly deep-dives run on the
      # laptop's subscription via scripts/nightly_analyst_local.py (pooled).
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install "pandas>=2.0" "numpy>=1.24"

      # persist the price + fundamentals caches between runs. Unique key each
      # run always saves a fresh copy; restore-keys pulls the most recent prior
      # one (the standard mutable-cache pattern). A cache miss (first run / rare
      # eviction) triggers a full backfill — slow that once, then incremental.
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            multibagger_screener/multibagger_screener/data_cache
            multibagger_screener/multibagger_screener/fundamentals_cache
          key: golden-data-${{ github.run_id }}
          restore-keys: golden-data-

      - name: Daily scan (prices + tag + diff + alerts + journal)
        run: python scripts/daily_scan.py

      # AI analyst step REMOVED (2026-07-20, user decision): dives run on the
      # laptop's subscription (scripts/nightly_analyst_local.py, pooled across
      # nights the laptop is off) — the cloud never spends API credits.

      - name: Paper book + forward outcomes
        run: |
          python scripts/paper_trader.py || echo "paper degraded (non-fatal)"
          python scripts/journal_outcomes.py || echo "outcomes degraded (non-fatal)"

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Telegram (only if configured)
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: python scripts/send_telegram.py || echo "telegram degraded (non-fatal)"

      # commit the small, durable FORWARD RECORD back to the repo (journal,
      # tonight's tag state = the diff baseline, alerts, positions). NOT the
      # 75MB caches (they live in actions/cache) and NOT dashboard.html (that
      # goes to Pages below — keeps git history lean).
      - name: Commit forward record
        run: |
          git config user.name "golden-stock-bot"
          git config user.email "actions@users.noreply.github.com"
          # add each path separately: git add aborts ALL staging if any one
          # pathspec matches nothing (e.g. analyst_health.json when the AI
          # step is skipped) — that silently dropped the whole forward record
          for p in journal state/tags_state.json state/alert_details.json \
                   state/analyst_health.json state/news_radar.json state/regime.json \
                   daily_alerts.md \
                   announcements_archive.csv positions.csv paper_positions.csv; do
            git add -f -- "$p" 2>/dev/null || echo "skip $p (absent)"
          done
          if git diff --cached --quiet; then
            echo "no forward-record changes to commit"
          else
            git commit -m "cloud: daily run $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash origin master || true
            git push origin HEAD:master
          fi

      - name: Upload dashboard artifact (view/download from the run page)
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: multibagger_screener/multibagger_screener/dashboard.html
          retention-days: 14

# Pages publishing moved to its OWN workflow (.github/workflows/pages.yml,
# 2026-07-20): it triggers on this workflow's completion (workflow_run) so fresh
# nightly data still republishes, AND on any push to the landing/dashboard
# source so edits go live immediately without waiting for a scan. A single
# dedicated deployer avoids two workflows racing on the one Pages deployment.
