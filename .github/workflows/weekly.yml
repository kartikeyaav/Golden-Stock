name: Weekly refresh (cloud)

# Full weekly rebuild in the cloud: universe -> prices -> focus list ->
# fundamentals -> ranked shortlist -> dashboard. Sunday 10:00 IST = 04:30 UTC.
# NSE rebalances indices only in Mar/Sep, so a weekly universe refresh is
# plenty. Also runnable on demand.
#
# AI COMMITTEE RUNS LOCALLY, NOT HERE (user decision 2026-07-19): API credits
# can run dry mid-cycle and the committee is the expensive call, so the cloud
# always passes --no-ai. The user runs `python scripts/ai_picks.py` on the
# laptop (Claude subscription auth — free at the margin), then pushes; the
# committed ai_picks.json survives this job untouched (--no-ai never rewrites
# it) and the dashboard build picks it up.
on:
  schedule:
    - cron: "30 4 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: golden-stock-pipeline
  cancel-in-progress: false

defaults:
  run:
    working-directory: multibagger_screener/multibagger_screener

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # fundamentals scrape of the shortlist is the long pole
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install "pandas>=2.0" "numpy>=1.24"

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            multibagger_screener/multibagger_screener/data_cache
            multibagger_screener/multibagger_screener/fundamentals_cache
          key: golden-data-${{ github.run_id }}
          restore-keys: golden-data-

      # --no-ai ALWAYS: the committee runs on the user's laptop (subscription
      # auth) and its ai_picks.json arrives via git push — see header comment.
      - name: Weekly refresh (no AI committee — runs locally)
        run: python scripts/weekly_refresh.py --no-ai

      - name: Commit refreshed record
        run: |
          git config user.name "golden-stock-bot"
          git config user.email "actions@users.noreply.github.com"
          # per-path add: one missing file (e.g. ai_picks.json without an API
          # key) must not abort staging of everything else
          for p in journal state/tags_state.json focus_list.csv universe.csv \
                   shortlist_ranked.csv fundamentals_flat.csv ai_picks.json; do
            git add -f -- "$p" 2>/dev/null || echo "skip $p (absent)"
          done
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "cloud: weekly refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash origin master || true
            git push origin HEAD:master
          fi
